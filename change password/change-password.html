<!DOCTYPE html>
                            <html class="dark" lang="en">
                            
                            <head>
                                <meta name="description" content="Tutora - Create a new password." />
                                <meta charset="utf-8" />
                                <meta content="width=device-width, initial-scale=1.0" name="viewport" />
                                <title>New Password | GEM AI Guide</title>
                                <link rel="icon" type="image/png" href="../museum.png">
                                <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet" />
                                <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet" />
                                <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
                                <link rel="stylesheet" href="../3.register/style.css"> 
                                <link rel="stylesheet" href="../2.login/style.css">
                                <link rel="stylesheet" href="../animate.css" />
                            	<link rel="stylesheet" href="../global-theme.css" />
                            </head>
                            
                            <body>
                                <div class="container">
                                    <!-- Transparent Absolute Header -->
                                    <header style="background-color: transparent; position: absolute; z-index: 10; width: 100%; padding: 2rem;">
                                        <nav style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                                            <div></div>
                                            <div class="nav-actions">
                                                <a class="login-link" href="../2.login/code.html" style="color: #ecb613;">Cancel</a>
                                            </div>
                                        </nav>
                                    </header>
                            
                                    <main>
                                        <div class="grid-layout">
                                            <!-- Left Column: Hero Image Panel -->
                                            <div class="hero-panel" style="background-image: url('../the-grand-egyptian-museum-fully-opens-completing-gizas-new-cultural-landmark_4.jpg');">
                                                <div class="hero-overlay" style="background: linear-gradient(to right, rgba(18,18,18,0.3), rgba(18,18,18,0.9));"></div>
                                                <div class="hero-content">
                                                    <h3 class="hero-title" style="font-family: 'Cormorant Garamond';font-size:3rem;text-shadow: 2px 2px 4px #000;">Secure your legacy.</h3>
                                                    <p class="hero-subtitle" style="font-size:1.2rem;text-shadow: 2px 2px 4px #000;">Create a strong new password to protect your account.</p>
                                                </div>
                                            </div>
                            
                                            <!-- Right Column: Form -->
                                            <div class="form-panel" style="display: flex; align-items: center; justify-content: center; background-color: #121212;">
                                                <div class="form-container" style="width: 100%; max-width: 480px;">
                                                    
                                                    <div style="display: flex; justify-content: center; margin-bottom: 2rem;">
                                                        <img src="../logo.png" alt="Tutora Logo" style="width: 150px; height: auto; filter: drop-shadow(0 0 10px rgba(236,182,19,0.3));">
                                                    </div>
                            
                                                    <div class="form-header" style="text-align: center; margin-bottom: 2rem;">
                                                        <h1 class="form-title" style="font-size: 2.2rem; font-weight: 800;color: white;">Set New Password</h1>
                                                        <p class="form-subtitle" style="margin-top: 0.5rem; color: #b3b3b3;">Must be at least 8 characters.</p>
                                                    </div>
                            
                                                    <form class="registration-form" id="changePasswordForm">
                                                        <div class="field-group">
                                                            <p class="field-label">New Password</p>
                                                            <div class="input-wrapper">
                                                                <input class="form-input" id="password" placeholder="Enter new password" type="password" required />
                                                                <div class="icon-addon" id="passwordToggle">
                                                                    <span class="material-symbols-outlined">visibility</span>
                                                                </div>
                                                            </div>
                                                        </div>
                            
                                                        <div class="field-group">
                                                            <p class="field-label">Confirm New Password</p>
                                                            <div class="input-wrapper">
                                                                <input class="form-input" id="confirmPassword" placeholder="Confirm new password" type="password" required />
                                                                <div class="icon-addon" id="confirmPasswordToggle">
                                                                    <span class="material-symbols-outlined">visibility</span>
                                                                </div>
                                                            </div>
                                                        </div>
                            
                                                        <button type="submit" class="submit-btn" id="changeBtn" style="width: 100%; padding: 1rem; background: #ecb613; color: #121212; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; margin-top: 1rem;">
                                                            Update Password
                                                        </button>
                                                    </form>
                                                </div>
                                            </div>
                                        </div>
                                    </main>
                                </div>
                            
                                <!-- Scripts -->
                                <script src="script.js"></script>
                                <script src="../global-core.js"></script>
                                <script src="../animate.js"></script>
                            </body>
                            </html>
