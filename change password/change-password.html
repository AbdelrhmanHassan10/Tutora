<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta name="description" content="Tutora - Create a powerful new password for your royal sanctuary." />
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>New Password | Tutora</title>
    <link rel="icon" type="image/png" href="../museum.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="../3.register/style.css">
    <link rel="stylesheet" href="../animate.css" />
    <link rel="stylesheet" href="../global-theme.css" />
    <style>
        #dust-container, #shapes-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .cursor-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%);
        }
    </style>
</head>

<body>
    <div id="dust-container"></div>
    <div id="shapes-container"></div>
    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="scene">
        <header class="main-header">
            <nav class="nav-container">
                <div class="logo-side">
                    <a href="../1.landing page/index.html" class="nav-logo">
                        <img src="../logo.png" alt="Tutora Logo">
                    </a>
                </div>
                <div class="nav-actions">
                    <a class="login-link-btn" href="../2.login/code.html">Cancel</a>
                </div>
            </nav>
        </header>

        <main class="main-content">
            <div class="grid-layout">
                <!-- Left Column: Hero Image Panel -->
                <div class="hero-panel" style="background-image: url('../the-grand-egyptian-museum-fully-opens-completing-gizas-new-cultural-landmark_4.jpg');">
                    <div class="hero-overlay"></div>
                    <div class="hero-content">
                        <h1 class="hero-title">Seal Your<br>Sanctuary</h1>
                        <p class="hero-subtitle">Protect your legacy with a powerful new secret key. The wisdom of Tutora remains secure.</p>
                    </div>
                </div>

                <!-- Right Column: New Password Form Panel -->
                <div class="form-panel">
                    <div class="form-card-3d" id="formCard">
                        <div class="form-card-inner">
                            <div class="form-container">
                                <div class="mobile-logo">
                                    <img src="../logo.png" alt="Tutora Logo">
                                </div>

                                <div class="form-header">
                                    <h1 class="form-title">New Password</h1>
                                    <p class="form-subtitle">Choose a powerful new key to protect your account.</p>
                                </div>

                                <form class="registration-form" id="changePasswordForm">
                                    <div class="field-group">
                                        <p class="field-label">New Password</p>
                                        <div class="input-wrapper">
                                            <input class="form-input" id="password" placeholder="Create a strong password" type="password" required />
                                            <div class="icon-addon" id="passwordToggle">
                                                <span class="material-symbols-outlined">visibility</span>
                                            </div>
                                            <div class="star-error" id="passwordError">
                                                <span class="error-text"></span>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="field-group">
                                        <p class="field-label">Confirm New Password</p>
                                        <div class="input-wrapper">
                                            <input class="form-input" id="confirmPassword" placeholder="Repeat your new password" type="password" required />
                                            <div class="icon-addon" id="confirmPasswordToggle">
                                                <span class="material-symbols-outlined">visibility</span>
                                            </div>
                                            <div class="star-error" id="confirmError">
                                                <span class="error-text"></span>
                                            </div>
                                        </div>
                                    </div>

                                    <button type="submit" class="submit-btn" id="changeBtn">
                                        <span>Update Password</span>
                                        <div class="btn-glow"></div>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script src="../global-core.js"></script>
    <script src="../animate.js"></script>
</body>
</html>
