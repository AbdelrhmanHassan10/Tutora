<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta name="description" content="Tutora Verification - Secure authentication for the royal gateway." />
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Verify Identity | Tutora</title>
    <link rel="icon" type="image/png" href="../museum.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="../3.register/style.css">
    <link rel="stylesheet" href="../animate.css" />
    <link rel="stylesheet" href="../global-theme.css" />
    <style>
        #dust-container, #shapes-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .cursor-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%);
        }
        .otp-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 2rem 0;
        }
        .otp-input {
            width: 50px;
            height: 65px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 800;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: #d4af37;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: var(--font-serif);
        }
        .otp-input:focus {
            border-color: var(--primary);
            background: rgba(212, 175, 55, 0.05);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
            transform: translateY(-5px);
        }
        @media (max-width: 480px) {
            .otp-input {
                width: 40px;
                height: 55px;
                font-size: 1.4rem;
            }
            .otp-container {
                gap: 8px;
            }
        }
    </style>
</head>

<body>
    <div id="dust-container"></div>
    <div id="shapes-container"></div>
    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="scene">
        <header class="main-header">
            <nav class="nav-container">
                <div class="logo-side">
                    <a href="../1.landing page/index.html" class="nav-logo">
                        <img src="../logo.png" alt="Tutora Logo">
                    </a>
                </div>
                <div class="nav-actions">
                    <a class="login-link-btn" href="../2.login/code.html">Cancel</a>
                </div>
            </nav>
        </header>

        <main class="main-content">
            <div class="grid-layout">
                <!-- Left Column: Hero Image Panel -->
                <div class="hero-panel" style="background-image: url('../pexels-felix-2154264868-35430906.jpg');">
                    <div class="hero-overlay"></div>
                    <div class="hero-content">
                        <h1 class="hero-title">Confirm Your<br>Spirit</h1>
                        <p class="hero-subtitle" style="color: rgb(191, 194, 196);">The ancients demand a sign of truth. Check your sanctuary for the 6-digit key.</p>
                    </div>
                </div>

                <!-- Right Column: Verification Form Panel -->
                <div class="form-panel">
                    <div class="form-card-3d" id="formCard">
                        <div class="form-card-inner">
                            <div class="form-container">
                                <div class="mobile-logo">
                                    <img src="../logo.png" alt="Tutora Logo">
                                </div>

                                <div class="form-header">
                                    <span class="material-symbols-outlined" style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem; filter: drop-shadow(0 0 10px var(--primary-glow));">mark_email_read</span>
                                    <h1 class="form-title">Enter Code</h1>
                                    <p class="form-subtitle">We've sent a secret transmission to your email.</p>
                                </div>

                                <form class="registration-form" id="verifyForm">
                                    <div class="otp-container">
                                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric" required />
                                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric" required />
                                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric" required />
                                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric" required />
                                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric" required />
                                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric" required />
                                    </div>

                                    <button type="submit" class="submit-btn" id="verifyBtn">
                                        <span>Confirm Identity</span>
                                        <div class="btn-glow"></div>
                                    </button>
                                </form>

                                <div class="login-footer-mobile">
                                    <span>Didn't receive it?</span>
                                    <a href="#" id="resendBtn" class="signup-link">Resend Code</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script src="../global-core.js"></script>
    <script src="../animate.js"></script>
</body>
</html>
