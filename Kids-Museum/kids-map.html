<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUTORA | Kids Museum Map</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Spline+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        .map-container {
            min-height: 100vh;
            padding: 4rem 2rem;
            background: #0d0c08;
            color: #f0e6c8;
            text-align: center;
        }

        .map-title {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            color: #ECB613;
            margin-bottom: 3rem;
            text-shadow: 0 0 20px rgba(236, 182, 19, 0.3);
        }

        .map-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(28, 27, 20, 0.8);
            border: 4px solid #393728;
            border-radius: 3rem;
            padding: 4rem;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .museum-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            position: relative;
        }

        .zone-card {
            background: #1a1710;
            border: 2px solid #393728;
            border-radius: 2rem;
            padding: 2rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
        }

        .zone-card:hover {
            transform: scale(1.05);
            border-color: #ECB613;
            background: #252219;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .zone-icon {
            font-size: 4rem;
            color: #ECB613;
            margin-bottom: 1rem;
            display: block;
        }

        .zone-name {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .zone-tag {
            font-size: 0.9rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .map-path {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            opacity: 0.2;
            z-index: -1;
        }

        .btn-back {
            margin-top: 4rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #ECB613;
            font-weight: 700;
            text-decoration: none;
            padding: 1rem 2rem;
            border: 2px solid #ECB613;
            border-radius: 999px;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: #ECB613;
            color: #000;
        }
    </style>
    <link rel="stylesheet" href="../global-theme.css" />
    <link rel="stylesheet" href="../global-lang.css" />
</head>

<body>
    <div class="map-container">
        <h1 class="map-title">Treasure Map</h1>

        <div class="map-wrapper">
            <div class="museum-grid">
                <div class="zone-card">
                    <span class="material-symbols-outlined zone-icon">temple_hindu</span>
                    <h3 class="zone-name">Entrance</h3>
                    <span class="zone-tag">Start Here</span>
                </div>
                <div class="zone-card">
                    <span class="material-symbols-outlined zone-icon">pets</span>
                    <h3 class="zone-name">Cat Alley</h3>
                    <span class="zone-tag">Pet the Bastet</span>
                </div>
                <div class="zone-card">
                    <span class="material-symbols-outlined zone-icon">skull</span>
                    <h3 class="zone-name">Mummy Zone</h3>
                    <span class="zone-tag">Spooky Fun</span>
                </div>
                <div class="zone-card">
                    <span class="material-symbols-outlined zone-icon">landscape</span>
                    <h3 class="zone-name">Pyramid Lab</h3>
                    <span class="zone-tag">Build & Play</span>
                </div>
                <div class="zone-card">
                    <span class="material-symbols-outlined zone-icon">auto_stories</span>
                    <h3 class="zone-name">Oracle Library</h3>
                    <span class="zone-tag">Secret Tales</span>
                </div>
                <div class="zone-card">
                    <span class="material-symbols-outlined zone-icon">savings</span>
                    <h3 class="zone-name">Treasure Vault</h3>
                    <span class="zone-tag">Find the Gold</span>
                </div>
            </div>
        </div>

        <a href="kids-museum.html" class="btn-back">
            <span class="material-symbols-outlined">arrow_back</span>
            Back to Museum
        </a>
    </div>
    <script src="../global-lang.js?v=1780353971499"></script>
</body>

</html>
