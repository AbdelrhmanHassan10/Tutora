<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUTORA | Kids Explorer Club</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Spline+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        .club-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: radial-gradient(circle at top right, #1a1710 0%, #0d0c08 100%);
        }
        .club-card {
            background: rgba(28, 27, 20, 0.95);
            border: 2px solid #ECB613;
            border-radius: 2rem;
            padding: 3rem;
            max-width: 800px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .club-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 10px;
            background: linear-gradient(90deg, #ECB613, #f0e6c8, #ECB613);
        }
        .club-icon {
            font-size: 5rem;
            color: #ECB613;
            margin-bottom: 1.5rem;
            display: block;
        }
        .club-title {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            color: #ECB613;
            margin-bottom: 1rem;
        }
        .club-desc {
            font-size: 1.2rem;
            color: #f0e6c8;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
        .benefits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .benefit-item {
            background: rgba(236, 182, 19, 0.05);
            border: 1px solid rgba(236, 182, 19, 0.2);
            padding: 1.5rem;
            border-radius: 1.5rem;
            transition: all 0.3s ease;
        }
        .benefit-item:hover {
            transform: translateY(-5px);
            background: rgba(236, 182, 19, 0.1);
            border-color: #ECB613;
        }
        .benefit-icon {
            font-size: 2.5rem;
            color: #ECB613;
            margin-bottom: 1rem;
            display: block;
        }
        .benefit-text {
            color: #f0e6c8;
            font-weight: 700;
        }
        .join-btn {
            background: #ECB613;
            color: #000;
            padding: 1rem 3rem;
            border-radius: 999px;
            font-size: 1.25rem;
            font-weight: 800;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(236, 182, 19, 0.3);
        }
        .join-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 30px rgba(236, 182, 19, 0.5);
        }
        .back-link {
            display: block;
            margin-top: 2rem;
            color: #888;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .back-link:hover {
            color: #ECB613;
        }
    </style>
</head>
<body>
    <div class="club-container">
        <div class="club-card">
            <span class="material-symbols-outlined club-icon">workspace_premium</span>
            <h1 class="club-title">Explorer Club</h1>
            <p class="club-desc">Join thousands of young explorers and unlock secret treasures, earn cool badges, and get invited to exclusive pharaoh parties!</p>
            
            <div class="benefits-grid">
                <div class="benefit-item">
                    <span class="material-symbols-outlined benefit-icon">military_tech</span>
                    <span class="benefit-text">Earn Golden Badges</span>
                </div>
                <div class="benefit-item">
                    <span class="material-symbols-outlined benefit-icon">lock_open</span>
                    <span class="benefit-text">Unlock Secret Missions</span>
                </div>
                <div class="benefit-item">
                    <span class="material-symbols-outlined benefit-icon">celebration</span>
                    <span class="benefit-text">VIP Kids Events</span>
                </div>
            </div>

            <a href="#" class="join-btn" onclick="alert('Welcome to the Club, Explorer! Your first mission starts now!')">JOIN NOW!</a>
            
            <a href="kids-museum.html" class="back-link">
                <span class="material-symbols-outlined" style="vertical-align: middle;">arrow_back</span>
                Go Back to Museum
            </a>
        </div>
    </div>
<script src="../global-lang.js"></script>
</body>
</html>
