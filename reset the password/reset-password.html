<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta name="description" content="Tutora - Recover your access to the royal gateway of the Grand Egyptian Museum." />
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Recover Your Journey | Tutora</title>
    <link rel="icon" type="image/png" href="../museum.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="../3.register/style.css">
    <link rel="stylesheet" href="../animate.css" />
    <link rel="stylesheet" href="../global-theme.css" />
    <style>
        #dust-container, #shapes-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .cursor-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%);
        }
    </style>
</head>

<body>
    <div id="dust-container"></div>
    <div id="shapes-container"></div>
    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="scene">
        <header class="main-header">
            <nav class="nav-container">
                <div class="logo-side">
                    <a href="../1.landing page/code.html" class="nav-logo">
                        <img src="../logo.png" alt="Tutora Logo">
                    </a>
                </div>
                <div class="nav-actions">
                    <span class="hidden-mobile">Remembered your password?</span>
                    <a class="login-link-btn" href="../2.login/code.html">Log In</a>
                </div>
            </nav>
        </header>

        <main class="main-content">
            <div class="grid-layout">
                <!-- Left Column: Hero Image Panel -->
                <div class="hero-panel" style="background-image: url('../the-grand-egyptian-museum-fully-opens-completing-gizas-new-cultural-landmark_3.jpg');">
                    <div class="hero-overlay"></div>
                    <div class="hero-content">
                        <h1 class="hero-title">Recover Your<br>Journey</h1>
                        <p class="hero-subtitle" style="color: rgb(191, 194, 196);">The light of wisdom never fades. Let us restore your access to eternity.</p>
                    </div>
                </div>

                <!-- Right Column: Reset Form Panel -->
                <div class="form-panel">
                    <div class="form-card-3d" id="formCard">
                        <div class="form-card-inner">
                            <div class="form-container">
                                <div class="mobile-logo">
                                    <img src="../logo.png" alt="Tutora Logo">
                                </div>

                                <div class="form-header">
                                    <h1 class="form-title">Forgot Password?</h1>
                                    <p class="form-subtitle">Enter your email to receive a secure recovery code.</p>
                                </div>

                                <form class="registration-form" id="resetForm">
                                    <div class="field-group">
                                        <p class="field-label">Email Address</p>
                                        <div class="input-wrapper">
                                            <input class="form-input" id="email" placeholder="Enter your registered email" type="email" required />
                                            <div class="star-error" id="emailError">
                                                <span class="error-text"></span>
                                            </div>
                                        </div>
                                    </div>

                                    <button type="submit" class="submit-btn" id="resetBtn">
                                        <span>Send Recovery Code</span>
                                        <div class="btn-glow"></div>
                                    </button>
                                </form>

                                <div class="login-footer-mobile">
                                    <span>Back to safety?</span>
                                    <a href="../2.login/code.html" class="signup-link">Log In</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script src="../global-core.js"></script>
    <script src="../animate.js"></script>
</body>
</html>
