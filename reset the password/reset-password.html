<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta name="description" content="Tutora - Your interactive gateway to the Grand Egyptian Museum. Explore pharaonic history, book tickets, and manage your artifacts." />
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Reset Password | GEM AI Guide</title>
    <link rel="icon" type="image/png" href="../museum.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="../3.register/style.css"> <!-- Shares main design system -->
    <link rel="stylesheet" href="../2.login/style.css"> <!-- Shares input system -->
    <link rel="stylesheet" href="../animate.css" />
	<link rel="stylesheet" href="../global-theme.css" />
</head>

<body>
    <div class="container">
        <!-- Transparent Absolute Header -->
        <header style="background-color: transparent; position: absolute; z-index: 10; width: 100%; padding: 2rem;">
            <nav style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <div></div>
                <div class="nav-actions">
                    <span class="hidden-mobile" style="padding-left:40px; color: #fff;">Remembered your password?</span>
                    <a class="login-link" href="../2.login/code.html" style="color: #ecb613;">Log In</a>
                </div>
            </nav>
        </header>

        <main>
            <div class="grid-layout">
                <!-- Left Column: Hero Image Panel -->
                <div class="hero-panel" style="background-image: url('../the-grand-egyptian-museum-fully-opens-completing-gizas-new-cultural-landmark_3.jpg');">
                    <div class="hero-overlay" style="background: linear-gradient(to right, rgba(18,18,18,0.3), rgba(18,18,18,0.9));"></div>
                    <div class="hero-content">
                        <h3 class="hero-title" style="font-family: 'Cormorant Garamond';font-size:3rem;text-shadow: 2px 2px 4px #000;">Recover your journey.</h3>
                        <p class="hero-subtitle" style="font-size:1.2rem;text-shadow: 2px 2px 4px #000;">Enter your email and we'll send a key to eternity.</p>
                    </div>
                </div>

                <!-- Right Column: Reset Form -->
                <div class="form-panel" style="display: flex; align-items: center; justify-content: center; background-color: #000;">
                    <div class="form-container" style="width: 100%; max-width: 480px;">
                        
                        <!-- Premium Logo prominently placed -->
                        <div style="display: flex; justify-content: center; margin-bottom: 2rem;">
                            <img src="../logo.png" alt="Tutora Logo" style="width: 150px; height: auto; filter: drop-shadow(0 0 10px rgba(236,182,19,0.3));">
                        </div>

                        <div class="form-header" style="text-align: center; margin-bottom: 2rem;">
                            <h1 class="form-title" style="font-size: 2.2rem; font-weight: 800;">Reset Password</h1>
                            <p class="form-subtitle" style="margin-top: 0.5rem; color: #b3b3b3;">Enter your email to receive a secure recovery link</p>
                        </div>

                        <form class="registration-form" id="resetForm">
                            <div class="field-group">
                                <p class="field-label">Email Address</p>
                                <div class="input-wrapper">
                                    <input class="form-input" id="email" placeholder="name@example.com" type="email" required />
                                </div>
                            </div>

                            <button type="submit" class="submit-btn" id="resetBtn" style="width: 100%; padding: 1rem; background: #ecb613; color: #121212; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; margin-top: 1rem;">
                                Send Reset Code
                            </button>
                            
                            <div style="margin-top: 2rem; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1.5rem;">
                                <a href="../2.login/code.html" style="color: #ecb613; text-decoration: none; font-size: 0.9rem; font-weight: bold; display: inline-flex; align-items: center; gap: 8px;">
                                    <span class="material-symbols-outlined" style="font-size: 1.2rem;">arrow_back</span>
                                    Return to Login
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script src="../global-core.js"></script>
    <script src="../animate.js"></script>
</body>
</html>
