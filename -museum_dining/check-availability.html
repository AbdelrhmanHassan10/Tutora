<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying Availability | Tutora Dining</title>
    <link rel="icon" type="image/png" href="../museum.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../global-theme.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .verify-container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .loader-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 3rem;
        }

        .loader-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(242, 208, 13, 0.1);
            border-top: 2px solid #F2D00D;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        .loader-ring:nth-child(2) {
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
            border: 2px solid rgba(242, 208, 13, 0.1);
            border-bottom: 2px solid #F2D00D;
            animation: spin-reverse 2s linear infinite;
        }

        .loader-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #F2D00D;
            font-size: 2rem;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            letter-spacing: 4px;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, #F2D00D, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s infinite linear;
        }

        .status-text {
            font-size: 1.1rem;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
            height: 1.5rem;
            margin-bottom: 2rem;
        }

        .venue-info {
            background: rgba(242, 208, 13, 0.05);
            border: 1px solid rgba(242, 208, 13, 0.2);
            padding: 1rem 2rem;
            border-radius: 50px;
            display: inline-block;
            color: #F2D00D;
            font-weight: 600;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.5s forwards 0.5s;
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(242, 208, 13, 0.05) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            z-index: 1;
        }
    </style>
</head>
<body class="dark">
    <div class="bg-glow"></div>
    <div class="verify-container">
        <div class="loader-wrapper">
            <div class="loader-ring"></div>
            <div class="loader-ring"></div>
            <div class="loader-icon">
                <span style="font-family: 'Cinzel', serif; font-weight: 900;">G</span>
            </div>
        </div>
        <h1>Verifying</h1>
        <div class="status-text" id="status">Connecting to systems...</div>
        <div class="venue-info" id="venueDisplay">Preparing your experience</div>
    </div>

    <script>
        const statuses = [
            "Connecting to venue database...",
            "Checking available time slots...",
            "Validating floor plan...",
            "Securing your table...",
            "Finalizing reservation..."
        ];

        const statusEl = document.getElementById('status');
        const venueDisplay = document.getElementById('venueDisplay');
        
        // Load data from localStorage
        const bookingData = JSON.parse(localStorage.getItem('diningBooking') || '{}');
        if (bookingData.venue) {
            venueDisplay.textContent = `Reservation at ${bookingData.venue}`;
        }

        let currentStatus = 0;
        const statusInterval = setInterval(() => {
            if (currentStatus < statuses.length) {
                statusEl.style.opacity = '0';
                setTimeout(() => {
                    statusEl.textContent = statuses[currentStatus];
                    statusEl.style.opacity = '1';
                    currentStatus++;
                }, 300);
            } else {
                clearInterval(statusInterval);
                setTimeout(() => {
                    window.location.href = '../booking/booking.html';
                }, 500);
            }
        }, 1200);
    </script>
</body>
</html>
