<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta name="description" content="Tutora - Your interactive gateway to the Grand Egyptian Museum. Explore pharaonic history, book tickets, and manage your artifacts." />
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login to Tutora | GEM AI Guide</title>
    <link rel="icon" type="image/png" href="../museum.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="../3.register/style.css"> <!-- Sharing the Register CSS -->
    <link rel="stylesheet" href="../animate.css" />
    <link rel="stylesheet" href="../global-theme.css" />
    <style>
        #dust-container, #shapes-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .cursor-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(236, 182, 19, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }
    </style>
</head>

<body>
    <div id="dust-container"></div>
    <div id="shapes-container"></div>
    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="scene">
        <header class="main-header">
            <nav class="nav-container">
                <div class="logo-side">
                    <a href="../1.landing page/code.html" class="nav-logo">
                        <img src="../logo.png" alt="Tutora Logo">
                    </a>
                </div>
                <div class="nav-actions">
                    <!-- <span class="hidden-mobile">New to the museum?</span> -->
                    <a class="login-link-btn" href="../3.register/code.html">Sign Up</a>
                </div>
            </nav>
        </header>

        <main class="main-content">
            <div class="grid-layout">
                <!-- Left Column: Hero Image Panel -->
                <div class="hero-panel" style="background-image: url('../1212.jpg');">
                    <div class="hero-overlay"></div>
                    <div class="hero-content">
                        <h1 class="hero-title">Welcome Back to<br>Eternity</h1>
                        <p class="hero-subtitle" style="color: rgb(243, 224, 190);">The wisdom of ancestors is ready. <span class="brand-namee">Tutora</span> awaits your return.</p>
                    </div>
                </div>

                <!-- Right Column: Login Form Panel -->
                <div class="form-panel">
                    <div class="form-card-3d" id="formCard">
                        <div class="form-card-inner">
                            <div class="form-container">
                                <!-- Mobile Logo -->
                                <div class="mobile-logo">
                                    <img src="../logo.png" alt="Tutora Logo">
                                </div>

                                <div class="form-header">
                                    <h1 class="form-title">Enter the Sanctuary</h1>
                                    <p class="form-subtitle">Re-awaken your journey through the royal history.</p>
                                </div>

                                <form class="registration-form" id="loginForm">
                                    <div class="field-group">
                                        <p class="field-label">Email Address</p>
                                        <div class="input-wrapper">
                                            <input class="form-input" id="email" placeholder="Enter your email" type="email" required />
                                            <div class="star-error" id="emailError">
                                                <span class="error-icon">✨</span>
                                                <span class="error-text"></span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="field-group">
                                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem;">
                                            <p class="field-label" style="margin-bottom: 0;">Password</p>
                                            <a href="../reset the password/reset-password.html" style="color: var(--primary); font-size: 0.8rem; text-decoration: none;">Forgot?</a>
                                        </div>
                                        <div class="input-wrapper">
                                            <input class="form-input" id="password" placeholder="Enter your password" type="password" required />
                                            <div class="icon-addon" id="passwordToggle">
                                                <span class="material-symbols-outlined">visibility</span>
                                            </div>
                                            <div class="star-error" id="passwordError">
                                                <span class="error-icon">✨</span>
                                                <span class="error-text"></span>
                                            </div>
                                        </div>
                                    </div>
                                    <button type="submit" class="submit-btn" id="loginBtn">
                                        <span>Log In</span>
                                        <div class="btn-glow"></div>
                                    </button>
                                </form>

                                <div class="login-footer-mobile">
                                    <span>New to the museum?</span>
                                    <a href="../3.register/code.html" class="signup-link">Sign Up</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script src="../global-core.js"></script>
    <script src="../animate.js"></script>
</body>
</html>
