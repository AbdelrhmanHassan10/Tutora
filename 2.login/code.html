<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta name="description" content="Tutora - Your interactive gateway to the Grand Egyptian Museum. Explore pharaonic history, book tickets, and manage your artifacts." />
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login to Tutora | GEM AI Guide</title>
    <link rel="icon" type="image/png" href="../museum.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="../3.register/style.css"> <!-- Sharing the Register CSS -->
    <link rel="stylesheet" href="../animate.css" />
    <link rel="stylesheet" href="../global-theme.css" />
    <style>
        #dust-container, #shapes-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .cursor-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(236, 182, 19, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div id="dust-container"></div>
    <div id="shapes-container"></div>
    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="scene">
        <header class="main-header">
            <nav class="nav-container">
                <div class="logo-side">
                    <a href="../1.landing page/index.html" class="nav-logo">
                        <img src="../logo.png" alt="Tutora Logo">
                    </a>
                </div>
                <div class="nav-actions">
                    <!-- <span class="hidden-mobile">New to the museum?</span> -->
                    <a class="login-link-btn" href="../3.register/code.html">Sign Up</a>
                </div>
            </nav>
        </header>

        <main class="main-content">
            <div class="grid-layout">
                <!-- Left Column: Hero Image Panel -->
                <div class="hero-panel" style="background-image: url('../1212.jpg');">
                    <div class="hero-overlay"></div>
                    <div class="hero-content">
                        <h1 class="hero-title">Welcome Back to<br>Eternity</h1>
                        <p class="hero-subtitle" style="color: rgb(243, 224, 190);">The wisdom of ancestors is ready. <span class="brand-namee">Tutora</span> awaits your return.</p>
                    </div>
                </div>

                <!-- Right Column: Login Form Panel -->
                <div class="form-panel">
                    <div class="form-card-3d" id="formCard">
                        <div class="form-card-inner">
                            <div class="form-container">
                                <!-- Mobile Logo -->
                                <div class="mobile-logo">
                                    <img src="../logo.png" alt="Tutora Logo">
                                </div>

                                <div class="form-header">
                                    <h1 class="form-title">Enter the Sanctuary</h1>
                                    <p class="form-subtitle">Re-awaken your journey through the royal history.</p>
                                </div>

                                <div class="social-group">
                                    <button class="social-btn google-btn" type="button" id="googleBtn">
                                        <svg class="social-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                                        </svg>
                                        <span>Google</span>
                                    </button>
                                    <button class="social-btn apple-btn" type="button">
                                        <svg class="social-icon" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
                                            <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-39-19.9-54.7-46-54.7-82.9zm-37.9-150.7c32.6-40.3 27-78.5 25.4-82 0 0-33.3 3-64.5 32.3-31.1 29.3-28.2 65.5-26.8 69.2 0 0 33.4 0.8 65.9-39.5z" fill="currentColor"/>
                                        </svg>
                                        <span>Apple</span>
                                    </button>
                                </div>

                                <div class="divider">
                                    <div class="divider-line"></div>
                                    <span class="divider-text">Or</span>
                                    <div class="divider-line"></div>
                                </div>

                                <form class="registration-form" id="loginForm">
                                    <div class="field-group">
                                        <p class="field-label">Email Address</p>
                                        <div class="input-wrapper">
                                            <input class="form-input" id="email" placeholder="Enter your email" type="email" required />
                                            <div class="star-error" id="emailError">
                                                <span class="error-icon">✨</span>
                                                <span class="error-text"></span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="field-group">
                                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem;">
                                            <p class="field-label" style="margin-bottom: 0;">Password</p>
                                            <a href="../reset the password/reset-password.html" style="color: var(--primary); font-size: 0.8rem; text-decoration: none;">Forgot?</a>
                                        </div>
                                        <div class="input-wrapper">
                                            <input class="form-input" id="password" placeholder="Enter your password" type="password" required />
                                            <div class="icon-addon" id="passwordToggle">
                                                <span class="material-symbols-outlined">visibility</span>
                                            </div>
                                            <div class="star-error" id="passwordError">
                                                <span class="error-icon">✨</span>
                                                <span class="error-text"></span>
                                            </div>
                                        </div>
                                    </div>
                                    <button type="submit" class="submit-btn" id="loginBtn">
                                        <span>Log In</span>
                                        <div class="btn-glow"></div>
                                    </button>
                                </form>

                                <div class="login-footer-mobile">
                                    <span>New to the museum?</span>
                                    <a href="../3.register/code.html" class="signup-link">Sign Up</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script src="../global-core.js"></script>
    <script src="../animate.js"></script>
</body>
</html>
