<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to Tutora | GEM AI Guide</title>
    <link rel="icon" type="image/png" href="../museum.png">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="login-container">
        <div class="background"></div>
        <div class="login-box">
            <div class="logo">
                <div class="logo-circle">
                    <img src="../logo.png" alt="">
                </div>

                 <p class="logo-text">Tutora</p>
            </div>

            <h1 style="font-weight: 150px;font-size: 55px;">Welcome Back</h1>
            <h2 style="font-weight: 150px;font-size: 17px;">Explore the wonders of ancient Egypt with your personal account.</h2>

            <form id="loginForm">
                <label style="padding-bottom: 5px;">Email</label>
                <div class="input-wrapper">
                    <span class="material-symbols-outlined">person</span>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <label style="padding-bottom:5px;">Password</label>
                <div class="input-wrapper">
                    <span class="material-symbols-outlined">lock</span>
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <span class="material-symbols-outlined toggle-password" id="togglePassword">visibility</span>
                </div>

                <div class="forgot-password">
                    <a href="../reset the password/reset-password.html">Forgot Password?</a>
                </div>

                <div id="loginError" class="error-message">Invalid email or password. Please try again.</div>

                <button type="submit" class="login-button" id="loginBtn">
                    <span class="button-text">Log In</span>
                    <div class="loading-spinner"></div>
                </button>
            </form>

            <p class="signup-text">
                New to the museum? <a href="../3.register/code.html">Sign Up</a>
            </p>
        </div>
    </div>

    <script src="script.js "></script>

<!-- Global Avatar Sync -->
<script>
document.addEventListener('DOMContentLoaded', () => {
    const localProfile = localStorage.getItem('localProfileData');
    if (localProfile) {
        try {
            const parsedData = JSON.parse(localProfile);
            if (parsedData.profileImage) {
                const profileImages = document.querySelectorAll('.profile-img, .profile-image, .user-avatar img, img[alt="Profile"]');
                profileImages.forEach(img => {
                    img.src = parsedData.profileImage;
                });
            }
        } catch(e) {}
    }
});
</script>
</body>

</html>
